name: Deploy to AWS ECS Fargate

on:
  push:
    branches:
      - aws-deploy
    paths:
      - "backend/**"
      - ".github/workflows/deploy-aws.yml"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: live-rooms-api
  ECS_CLUSTER: live-rooms-cluster
  ECS_SERVICE: live-rooms-api
  ECS_TASK_DEFINITION: live-rooms-api
  CONTAINER_NAME: live-rooms-api

jobs:
  build-and-deploy:
    name: Build & Deploy to Fargate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build \
            --tag "$IMAGE_URI" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            ./backend
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # Pull the current task definition from ECS so we only patch the image,
      # leaving all other settings (secrets, CPU, memory, IAM role) intact.
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy updated task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # Wait for the new deployment to stabilise before marking the
          # workflow run as successful.
          wait-for-service-stability: true
