name: live_rooms
description: Real-time chat and room management mobile app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1

  # Real-time
  socket_io_client: ^2.0.3+1

  # HTTP
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.1
  timeago: ^3.6.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
